---
- name: Configure DevSec EC2 Server
  hosts: devsec_server
  become: yes

  tasks:

    # -------------------------
    # Remove leftover Jenkins repo (prevents apt errors)
    # -------------------------

    - name: Remove Jenkins repository if it exists
      file:
        path: /etc/apt/sources.list.d/jenkins.list
        state: absent

    # -------------------------
    # Update system
    # -------------------------

    - name: Update apt cache
      apt:
        update_cache: yes

    # -------------------------
    # Install base packages
    # -------------------------

    - name: Install base utilities
      apt:
        name:
          - git
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    # -------------------------
    # Install Docker
    # -------------------------

    - name: Install Docker Engine
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # -------------------------
    # Install Docker Compose
    # -------------------------

    - name: Download Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    # -------------------------
    # Install Java (for CI tools)
    # -------------------------

    - name: Install OpenJDK 17
      apt:
        name: openjdk-17-jdk
        state: present

    # -------------------------
    # Install kubectl
    # -------------------------

    - name: Download kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'

    # -------------------------
    # Install Trivy (DevSec scanner)
    # -------------------------

    - name: Add Trivy GPG key
      apt_key:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        state: present

    - name: Add Trivy repository
      apt_repository:
        repo: "deb https://aquasecurity.github.io/trivy-repo/deb {{ ansible_distribution_release }} main"
        state: present

    - name: Install Trivy
      apt:
        name: trivy
        state: present
        update_cache: yes

    # -------------------------
    # Verification Section
    # -------------------------

    - name: Check Docker version
      command: docker --version
      register: docker_version

    - name: Show Docker version
      debug:
        var: docker_version.stdout

    - name: Check Docker Compose version
      command: docker-compose --version
      register: compose_version

    - name: Show Docker Compose version
      debug:
        var: compose_version.stdout

    - name: Check kubectl version
      command: kubectl version --client
      register: kubectl_version

    - name: Show kubectl version
      debug:
        var: kubectl_version.stdout

    - name: Check Java version
      command: java -version
      register: java_version
      ignore_errors: yes

    - name: Check Trivy version
      command: trivy --version
      register: trivy_version

    - name: Show Trivy version
      debug:
        var: trivy_version.stdout
